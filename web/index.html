<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta http-equiv="Content-Security-Policy" 
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https: wss:;">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Patel Properties">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Patel Properties">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Patel Properties</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <script>
    if ('serviceWorker' in navigator) {

      // ✅ Flutter SW — registers immediately, no 'load' wrapper
      // iOS Safari requires this to happen before Flutter bootstrap
      navigator.serviceWorker
        .register('flutter_service_worker.js', { scope: '/' })
        .then(function(reg) {
          console.log('Flutter SW registered:', reg);
        })
        .catch(function(err) {
          console.warn('Flutter SW failed (non-fatal):', err);
        });

      // ✅ Firebase SW — skipped on iOS entirely
      // iOS Safari doesn't support FCM push, registering this SW causes errors
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (!isIOS) {
        navigator.serviceWorker
          .register('firebase-messaging-sw.js', { scope: '/firebase-cloud-messaging-push-scope' })
          .then(function(reg) {
            console.log('Firebase SW registered:', reg);
          })
          .catch(function(err) {
            console.warn('Firebase SW failed (non-fatal):', err);
          });
      }

    }
  </script>

  <!-- ✅ Flutter bootstrap — loads after SW registration -->
  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
