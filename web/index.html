  <meta charset="UTF-8">

  <!-- iOS meta tags & icons -->

  <meta name="apple-mobile-web-app-capable" content="yes">

<body>

  <!-- 🔍 Temporary debug tool — REMOVE after fixing -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script> -->

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {

        // Flutter SW
        navigator.serviceWorker.register('flutter_service_worker.js')
          .then(function(reg) {
            console.log('Flutter SW registered:', reg);
          }).catch(function(err) {
            console.error('Flutter SW failed:', err);
          });

        // Firebase SW — now safe for iOS
        navigator.serviceWorker.register('firebase-messaging-sw.js')
          .then(function(reg) {
            console.log('Firebase SW registered:', reg);
          }).catch(function(err) {
            console.error('Firebase SW failed:', err);
          });

      });
    }
  </script>

  <!-- ✅ Flutter bootstrap — must be after SW registration -->
  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
